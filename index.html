<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Interface</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --calc-bg: #e0e5ec;
            --text-color: #333;
            --btn-bg: #e0e5ec;
            --btn-operator: #4facfe;
            --btn-clear: #ff6b6b;
            --shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
            --inner-shadow: inset 6px 6px 10px 0 rgba(163,177,198, 0.6), inset -6px -6px 10px 0 rgba(255,255,255, 0.7);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 320px;
        }

        .display {
            width: 100%;
            height: 80px;
            background-color: var(--calc-bg);
            box-shadow: var(--inner-shadow);
            border: none;
            border-radius: 10px;
            text-align: right;
            padding: 20px;
            font-size: 36px;
            color: var(--text-color);
            box-sizing: border-box;
            margin-bottom: 30px;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px 0;
            font-size: 22px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background-color: var(--btn-bg);
            color: var(--text-color);
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        button:active {
            box-shadow: var(--inner-shadow);
            color: #777;
        }

        .operator {
            color: var(--btn-operator);
            font-weight: 800;
            font-size: 26px;
        }

        .clear {
            color: var(--btn-clear);
            font-weight: 800;
        }

        .equals {
            color: #fff;
            background-color: var(--btn-operator);
            box-shadow: 5px 5px 10px rgba(79, 172, 254, 0.4), -5px -5px 10px rgba(255,255,255, 0.5);
        }

        .equals:active {
            box-shadow: inset 3px 3px 6px rgba(0,0,0, 0.2), inset -3px -3px 6px rgba(255,255,255, 0.4);
            color: #fff;
        }

        .span-2 {
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="output" value="0" readonly>
        <div class="buttons">
            <button class="clear span-2" id="btn-c">C</button>
            <button class="clear" id="btn-ce">CE</button>
            <button class="operator" id="btn-divide">÷</button>

            <button class="number" id="btn-7">7</button>
            <button class="number" id="btn-8">8</button>
            <button class="number" id="btn-9">9</button>
            <button class="operator" id="btn-multiply">×</button>

            <button class="number" id="btn-4">4</button>
            <button class="number" id="btn-5">5</button>
            <button class="number" id="btn-6">6</button>
            <button class="operator" id="btn-subtract">−</button>

            <button class="number" id="btn-1">1</button>
            <button class="number" id="btn-2">2</button>
            <button class="number" id="btn-3">3</button>
            <button class="operator" id="btn-add">+</button>

            <button class="number span-2" id="btn-0">0</button>
            <button class="number" id="btn-dot">.</button>
            <button class="equals" id="btn-equals">=</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
